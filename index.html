<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NutriLens AI</title>

  <!-- PWA META -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f8bd72" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="NutriLens" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f7f8fb;
    }

    .app {
      max-width: 480px;
      margin: auto;
    }

    .top {
      background: linear-gradient(#ffc97d, #f8bd72);
      padding: 20px;
      color: white;
      text-align: center;
    }

    .circle {
      font-size: 28px;
      font-weight: bold;
    }

    .content {
      padding: 20px;
    }

    .date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .date-pill {
      background: #eee;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .primary {
      background: #18a98b;
      color: white;
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <div class="top">
      <div class="circle" id="topCalories">0 kcal</div>
      <div>Daily Intake</div>
    </div>

    <div class="content">

      <!-- DATE -->
      <div class="date-row">
        <button id="prevDateButton">◀</button>
        <div id="currentDateLabel" class="date-pill">📅 Today</div>
        <button id="nextDateButton">▶</button>
      </div>

      <!-- FOOD INPUT -->
      <textarea id="descriptionInput" placeholder="e.g. rice 150g chicken 100g"></textarea>
      <input id="portionInput" type="number" value="100" />

      <button id="analyzeButton" class="primary">Analyze</button>

      <h3 id="result">No data</h3>

      <button id="addToDayButton" disabled>Add to day</button>

      <div id="mealLog"></div>

    </div>
  </div>

  <!-- MAIN SCRIPT -->
  <script src="app.js?v=13"></script>

  <!-- SERVICE WORKER -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/service-worker.js");
      });
    }
  </script>

</body>
</html>
